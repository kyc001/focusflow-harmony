server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/focus_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  sql:
    init:
      mode: never
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

focus:
  jwt:
    secret: ${FOCUS_JWT_SECRET:focus-dev-secret-change-me}
    expire-seconds: ${FOCUS_JWT_EXPIRE_SECONDS:604800}
