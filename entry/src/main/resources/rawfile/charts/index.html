<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focus Review</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7faff;
      color: #182033;
    }
    .page { padding: 16px; }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #687386; font-size: 12px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .card {
      background: #fff;
      border: 1px solid #e5eaf2;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 4px 12px rgba(20, 34, 64, .06);
    }
    .label { color: #687386; font-size: 11px; }
    .value { font-size: 21px; font-weight: 700; color: #2f6bff; margin-top: 6px; }
    canvas { width: 100%; height: 170px; display: block; }
    button {
      border: 0;
      background: #182033;
      color: white;
      border-radius: 8px;
      padding: 10px 12px;
      margin-right: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="title">Focus 混合复盘</div>
  <div class="sub">本页部署于 rawfile/charts/index.html，由 ArkWeb 承载；数据来自 ArkTS 注入对象。</div>
  <div class="grid">
    <div class="card"><div class="label">专注分钟</div><div id="minutes" class="value">0</div></div>
    <div class="card"><div class="label">完成番茄</div><div id="done" class="value">0</div></div>
    <div class="card"><div class="label">连续打卡</div><div id="streak" class="value">0</div></div>
  </div>
  <div class="card">
    <div class="label">周学习时长</div>
    <canvas id="bar" width="640" height="220"></canvas>
  </div>
  <div style="margin-top: 12px;">
    <button onclick="exportPng()">导出图表</button>
    <button onclick="shareReport()">分享报告</button>
  </div>
</div>
<script>
  function fallbackStats() {
    return {
      totalMinutes: 95,
      completed: 4,
      streak: 2,
      week: [
        { label: '一', value: 25 },
        { label: '二', value: 50 },
        { label: '三', value: 0 },
        { label: '四', value: 20 },
        { label: '五', value: 0 },
        { label: '六', value: 0 },
        { label: '日', value: 0 }
      ]
    };
  }
  function getStats() {
    try {
      if (window.nativeBridge && window.nativeBridge.getStats) {
        return JSON.parse(window.nativeBridge.getStats());
      }
    } catch (e) {}
    return fallbackStats();
  }
  function render() {
    const data = getStats();
    document.getElementById('minutes').textContent = data.totalMinutes;
    document.getElementById('done').textContent = data.completed;
    document.getElementById('streak').textContent = data.streak;
    const canvas = document.getElementById('bar');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const max = Math.max(1, ...data.week.map(item => item.value));
    data.week.forEach((item, index) => {
      const x = 36 + index * 82;
      const h = Math.max(8, item.value / max * 150);
      ctx.fillStyle = '#2f6bff';
      ctx.fillRect(x, 170 - h, 36, h);
      ctx.fillStyle = '#687386';
      ctx.font = '18px Arial';
      ctx.fillText(item.label, x + 10, 205);
      ctx.fillText(String(item.value), x + 4, 160 - h);
    });
  }
  function exportPng() {
    if (window.nativeBridge && window.nativeBridge.exportPng) {
      window.nativeBridge.exportPng();
    }
  }
  function shareReport() {
    if (window.nativeBridge && window.nativeBridge.shareReport) {
      window.nativeBridge.shareReport();
    }
  }
  render();
</script>
</body>
</html>
